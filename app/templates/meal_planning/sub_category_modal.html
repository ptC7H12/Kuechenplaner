<div class="p-6" x-data="subCategoryModal()">
    <div class="flex items-start justify-between mb-4">
        <div>
            <h2 class="text-xl font-bold text-gray-900">Gang wählen</h2>
            <p class="text-sm text-gray-600 mt-1">
                {% if meal_plan.recipe %}{{ meal_plan.recipe.name }} &middot; {% endif %}
                {{ meal_plan.meal_date.strftime('%d.%m.%Y') }} &middot; {{ meal_plan.meal_type.value }}
            </p>
        </div>
        <button type="button" @click="$dispatch('close-modal')" class="text-gray-400 hover:text-gray-600" aria-label="Schließen">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <div class="space-y-2 mb-4">
        {% for option in sub_categories %}
        <button type="button"
                @click="save('{{ option }}')"
                class="btn w-full justify-start {% if meal_plan.sub_category == option %}btn-primary{% else %}btn-secondary{% endif %}"
                :disabled="submitting">
            {{ option }}
        </button>
        {% endfor %}
    </div>

    <div class="flex justify-between gap-3 border-t pt-4">
        <button type="button" @click="save(null)" class="btn btn-icon text-red-600 hover:bg-red-50" :disabled="submitting" title="Gang entfernen">
            <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9z" clip-rule="evenodd"></path>
            </svg>
            <span class="text-sm font-bold">Gang entfernen</span>
        </button>
        <button type="button" @click="$dispatch('close-modal')" class="btn btn-secondary">Abbrechen</button>
    </div>
</div>

<script>
function subCategoryModal() {
    return {
        submitting: false,
        async save(value) {
            this.submitting = true;
            try {
                const response = await fetch(`/meal-planning/api/meal-plans/{{ meal_plan.id }}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sub_category: value }),
                });
                if (!response.ok) throw new Error('Speichern fehlgeschlagen');
                window.FreizeitApp.showToast('Gang aktualisiert', 'success');
                window.dispatchEvent(new CustomEvent('close-modal'));
                window.location.reload();
            } catch (err) {
                window.FreizeitApp.showToast('Fehler beim Speichern', 'error');
            } finally {
                this.submitting = false;
            }
        },
    };
}
</script>
