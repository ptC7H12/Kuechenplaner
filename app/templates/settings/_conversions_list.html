{% if unit_conversions %}
<div class="space-y-2">
    {% for from_unit, conv in unit_conversions.items() %}
    <div class="flex items-center justify-between bg-white border-2 border-gray-200 rounded-xl p-3 hover:shadow-md transition-all">
        <span class="text-sm font-medium text-gray-900">
            1 {{ from_unit }} → {{ conv.factor }} {{ conv.target }}
        </span>
        <button type="button"
                hx-delete="/settings/api/settings/units/conversions/{{ from_unit | urlencode }}"
                hx-target="#conversions-list"
                hx-swap="innerHTML"
                hx-confirm="Konvertierung '{{ from_unit }}' wirklich löschen?"
                class="text-red-600 hover:text-red-800 hover:bg-red-50 p-2 rounded-lg transition-all"
                aria-label="Konvertierung {{ from_unit }} löschen">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-4 text-gray-500 text-sm">
    Keine benutzerdefinierten Konvertierungen vorhanden
</div>
{% endif %}
