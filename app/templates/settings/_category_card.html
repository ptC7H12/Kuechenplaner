<div class="flex items-center justify-between p-4 border-2 border-gray-200 rounded-xl bg-white hover:shadow-lg transition-all" id="category-{{ category.id }}">
    <div class="flex items-center space-x-3">
        <div class="w-5 h-5 rounded-full border-2 border-gray-200 shadow-sm" style="background-color: {{ category.color }}"></div>
        <span class="font-semibold text-gray-900">{{ category.name }}</span>
    </div>
    <button hx-delete="/settings/api/categories/{{ category.id }}"
            hx-confirm="Kategorie '{{ category.name }}' wirklich löschen? Zutaten verlieren dadurch diese Kategorie."
            hx-target="#category-{{ category.id }}"
            hx-swap="outerHTML swap:0.3s"
            class="text-red-600 hover:text-red-800 hover:bg-red-50 p-2 rounded-lg transition-all"
            aria-label="Kategorie {{ category.name }} löschen">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
        </svg>
    </button>
</div>
