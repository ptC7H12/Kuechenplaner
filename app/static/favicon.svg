<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="url(#bg)"/>

  <!-- Lid knob -->
  <rect x="45" y="26" width="10" height="3" rx="1.5" fill="white" opacity="0.9"/>

  <!-- Lid bar -->
  <rect x="30" y="33" width="40" height="4" rx="2" fill="white"/>

  <!-- Pot body -->
  <rect x="22" y="37" width="56" height="36" rx="7" fill="white"/>

  <!-- Handles -->
  <path d="M20 44 Q14 44 14 50 Q14 56 20 56" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M80 44 Q86 44 86 50 Q86 56 80 56" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Food dots -->
  <circle cx="41" cy="44" r="2.5" fill="#FBBF24" opacity="0.85"/>
  <circle cx="50" cy="45" r="2.5" fill="#F87171" opacity="0.85"/>
  <circle cx="59" cy="44" r="2.5" fill="#34D399" opacity="0.85"/>

  <!-- Recipe text lines -->
  <rect x="30" y="79" width="40" height="2" rx="1" fill="white" opacity="0.4"/>
  <rect x="34" y="83" width="32" height="2" rx="1" fill="white" opacity="0.4"/>
</svg>
